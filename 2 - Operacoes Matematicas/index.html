<body>

    <article id="multiplicacoes">
        <div class="titleArticle">
            <div class="titleShow">
                <h2>Multiplicação</h2>
                <button class="btnDropdown" id="dropdownMultiplicacao" onclick="dropdownMultiplicacoes()"><i
                        class='bx bx-chevron-down'></i></button>
            </div>
            <div class="inputContainer">
                <input id="numMultiplicacao" type="number" placeholder="Digite um número...">
            </div>
        </div>
        <div id="operacoesMultiplicacao" class="operacoes">
            <div class="operacaoDobro">
                <h3>Dobro</h3>
                <input id="resDobro" disabled="true" type="number">
            </div>
            <div class="operacaoTriplo">
                <h3>Triplo</h3>
                <input id="resTriplo" disabled="true" type="number">
            </div>
            <div class="operacaoQuadruplo">
                <h3>Quádruplo</h3>
                <input id="resQuadruplo" disabled="true" type="number">
            </div>
            <div class="operacaoQuintuplo">
                <h3>Quíntuplo</h3>
                <input id="resQuintuplo" disabled="true" type="number">
            </div>
            <div class="operacaoSextuplo">
                <h3>Sêxtuplo</h3>
                <input id="resSextuplo" disabled="true" type="number">
            </div>
        </div>
    </article>

    <article id="exponenciacoes">
        <div class="titleArticle">
            <div class="titleShow">
                <h2>Exponenciação</h2>
                <button class="btnDropdown" id="dropdownExpoente" onclick="dropdownExponenciacoes()"><i
                        class='bx bx-chevron-down'></i></button>
            </div>
            <div class="inputContainer">
                <input id="numExponenciacao" type="number" placeholder="Digite um número...">
            </div>
        </div>
        <div id="operacoesExponenciacoes" class="operacoes">
            <div class="operacaoQuadrado">
                <h3>Quadrado</h3>
                <input id="resQuadrado" disabled="true" type="number">
            </div>
            <div class="operacaoCubo">
                <h3>Cubo</h3>
                <input id="resCubo" disabled="true" type="number">
            </div>
            <div class="operacaoQuarta">
                <h3>Quarta</h3>
                <input id="resQuarta" disabled="true" type="number">
            </div>
            <div class="operacaoQuinta">
                <h3>Quinta</h3>
                <input id="resQuinta" disabled="true" type="number">
            </div>
            <div class="operacaoSexta">
                <h3>Sexta</h3>
                <input id="resSexta" disabled="true" type="number">
            </div>
        </div>
    </article>

    <article id="imparPar">
        <div class="titleArticle">
            <div class="titleShow">
                <h2>Ímpar ou Par</h2>
                <button class="btnDropdown" id="dropdownImparPar" onclick="dropdownImparPar()"><i
                        class='bx bx-chevron-down'></i></button>
            </div>
            <div class="inputContainer">
                <input id="numImparPar" type="number" step="1" placeholder="Digite um número...">
            </div>
        </div>
        <div id="operacoesImparPar" class="operacoes">
            <div class="operacaoImparPar">
                <h3>Resultado</h3>
                <input id="resImparPar" disabled="true" type="text">
            </div>
        </div>
    </article>

    <article id="bhaskara">
        <div class="titleArticle">
            <div class="titleShow">
                <h2>Bhaskara</h2>
                <button class="btnDropdown" id="dropdownBhaskara" onclick="dropdownBhaskara()"><i
                        class='bx bx-chevron-down'></i></button>
            </div>
            <p id="descFormulaBhaskara">ax² + bx + c = 0</p>
            <div class="inputContainer">
                <input id="numA" type="number" placeholder="Digite o valor de a..." required>
                <input id="numB" type="number" placeholder="Digite o valor de b..." required>
                <input id="numC" type="number" placeholder="Digite o valor de c..." required>
                <button onclick="calcBhaskara()" type="submit" id="btnCalcBhaskara">Calcular</button>
            </div>
        </div>
        <div id="operacoesBhaskara" class="operacoes">
            <div class="operacaoDelta">
                <h3>Delta</h3>
                <input id="resDelta" disabled="true" type="number">
            </div>
            <div class="operacaoX1">
                <h3>x1</h3>
                <input id="resX1" disabled="true">
            </div>
            <div class="operacaoX2">
                <h3>x2</h3>
                <input id="resX2" disabled="true">
            </div>
        </div>
    </article>

    <article id="mediaAritmetica">
        <div class="titleArticle">
            <div class="titleShow">
                <h2>Média Aritmética</h2>
                <button class="btnDropdown" id="dropdownMediaAritmetica" onclick="dropdownMediaAritmetica()"><i
                        class='bx bx-chevron-down'></i></button>
            </div>
            <p id="descFormulaMediaAritmetica">M = (x1 + x2 + x3 + x4) / 4</p>
            <div class="inputContainer">
                <input id="numX1" type="number" placeholder="Digite o valor de x1..." required>
                <input id="numX2" type="number" placeholder="Digite o valor de x2..." required>
                <input id="numX3" type="number" placeholder="Digite o valor de x3..." required>
                <input id="numX4" type="number" placeholder="Digite o valor de x4..." required>
                <button onclick="calcMediaAritmetica()" type="submit" id="btnCalcMediaAritmetica">Calcular</button>
            </div>
        </div>
        <div id="operacoesMediaAritmetica" class="operacoes">
            <div class="operacaoMediaAritmetica">
                <h3>Média</h3>
                <input id="resMediaAritmetica" disabled="true" type="number">
            </div>
        </div>
    </article>

    <script src="src/js/components/sidebar.js"></script>
    <script src="src/js/components/dropdown.js"></script>
    <script src="src/js/features/multiplicacao.js"></script>
    <script src="src/js/features/exponenciacao.js"></script>
    <script src="src/js/features/bhaskara.js"></script>
    <script src="src/js/features/mediaAritmetica.js"></script>
    <script src="src/js/features/imparPar.js"></script>
</body>

</html>
