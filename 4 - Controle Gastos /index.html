<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="src/styles/style.css" />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Gastos</title>
  </head>
  <body
    class="flex items-center justify-center m-12 bg-bg-0-h text-fg-1 font-geist"
  >
    <main
      class="flex flex-col items-center gap-6 p-8 w-2/4 h-[600px] bg-bg-0 rounded-xl"
    >
      <h1 class="text-2xl font-bold">Controle de Gastos</h1>
      <!-- formulário para inserir os gastos na lista -->
      <form
        id="formGastos"
        class="flex flex-col items-center justify-center gap-4 w-full"
      >
        <div class="flex items-center justify-center gap-8 w-full text-sm">
          <!-- descrição -->
          <input
            id="descricao"
            class="inputs"
            type="text"
            placeholder="Descrição..."
            autocomplete="off"
          />
          <!-- valor -->
          <input
            id="valor"
            class="inputs"
            type="number"
            placeholder="Valor (R$)..."
            autocomplete="off"
          />
          <!-- categoria -->
          <select
            id="categoria"
            class="px-2 py-2.5 w-full bg-none rounded-lg border-2 border-bg-3 font-medium outline-none cursor-pointer transition-all ease-in-out duration-250 hover:bg-orange-h/15 hover:border-orange-h checked:rounded-lg checked:border-2 checked:border-orange-h checked:bg-orange-h/15"
          >
            <option
              class="bg-bg-0-h checked:bg-orange-h checked:border-2 checked:border-orange-h"
              value=""
              hidden
            >
              Categoria
            </option>
            <option
              class="bg-bg-0-h checked:bg-orange-h checked:border-2 checked:border-orange-h"
              value="Alimentação"
            >
              Alimentação
            </option>
            <option
              class="bg-bg-0-h checked:bg-orange-h checked:border-2 checked:border-orange-h"
              value="Transporte"
            >
              Transporte
            </option>
            <option
              class="bg-bg-0-h checked:bg-orange-h checked:border-2 checked:border-orange-h"
              value="Lazer"
            >
              Lazer
            </option>
          </select>
        </div>
        <!-- botão para enviar o forms -->
        <button
          class="p-2 w-full rounded-lg bg-orange-h/50 border-2 border-orange-h text-md font-semibold cursor-pointer appearance-none"
          type="submit"
        >
          Adicionar gasto
        </button>
      </form>
      <!-- filtro de categoria e valor total -->
      <div class="flex items-center justify-between w-full text-md">
        <div class="flex flex-col items-center justify-center">
          <div class="flex items-center justify-center gap-2">
            <p class="text-sm">Filtrar categoria</p>
            <i class="bx bx-filter"></i>
          </div>
          <!-- filtro categoria -->
          <select
            id="categoriaFiltro"
            class="px-1 py-1.5 w-full bg-none rounded-lg border-2 border-bg-3 text-sm font-medium outline-none cursor-pointer transition-all ease-in-out duration-250 hover:bg-orange-h/15 hover:border-orange-h checked:rounded-lg checked:border-2 checked:border-orange-h checked:bg-orange-h/15"
          >
            <option
              class="bg-bg-0-h checked:bg-orange-h checked:border-2 checked:border-orange-h"
              value="Todos"
            >
              Todos
            </option>
            <option
              class="bg-bg-0-h checked:bg-orange-h checked:border-2 checked:border-orange-h"
              value="Alimetação"
            >
              Alimetação
            </option>
            <option
              class="bg-bg-0-h checked:bg-orange-h checked:border-2 checked:border-orange-h"
              value="Transporte"
            >
              Transporte
            </option>
            <option
              class="bg-bg-0-h checked:bg-orange-h checked:border-2 checked:border-orange-h"
              value="Lazer"
            >
              Lazer
            </option>
          </select>
        </div>
        <div
          class="flex px-4 py-1.5 bg-bg-1 rounded-lg border-2 border-bg-3 text-md font-semibold"
        >
          <h5>
            Valor Total: <span id="valorTotal" class="text-fg">R$ 0,00</span>
          </h5>
        </div>
      </div>
      <!-- lista gastos -->
      <div
        class="w-full max-h-[300px] overflow-y-auto pr-2 scroll-smooth [&::-webkit-scrollbar]:w-1.5 [&::-webkit-scrollbar-track]:bg-transparent [&::-webkit-scrollbar-thumb]:bg-bg-2 [&::-webkit-scrollbar-thumb]:rounded-full"
      >
        <ul id="listaGastos" class="flex flex-col gap-2 w-full"></ul>
      </div>
    </main>
    <script src="src/main.js"></script>
  </body>
</html>
